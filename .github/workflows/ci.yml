name: CI

on:
  push:
    branches: [main]
    paths-ignore: &docs_paths
      - "**/*.md"
      - "**/*.mdc"
      - "docs/**"
      - "LICENSE.txt"
      - "ACKNOWLEDGMENTS.txt"
  pull_request:
    paths-ignore: *docs_paths
  workflow_dispatch:

jobs:

  # Pure static analysis. Results don't depend on OS, so this only needs to run once.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m compileall -q python tools pipeline editor examples python_ext/python

      - name: Lint with ruff
        run: |
          pip install ruff==0.15.22
          ruff check --select F --ignore F401,F403,F541,F841 python tools pipeline editor examples python_ext/python

  # Verify the spear Python package actually installs and imports on each platform.
  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the spear Python package
        run: pip install -e "python[examples]"

      - name: Import spear
        run: python -c "import spear; spear.log('spear imported successfully, __can_import_spear_ext__ = ', spear.__can_import_spear_ext__)"

  # Compile the spear_ext Python extension module and its vendored third-party libraries
  # (boost, rpclib, yaml-cpp) using the system compiler. This intentionally excludes Linux,
  # because our build scripts source clang/libc++ from an Unreal Engine install on Linux.
  #
  # We pin windows-2022 rather than windows-latest because MSVC v143 (v14.44-17.14) is required.
  compile-spear-ext:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # install_python_extension.py requires an activated conda environment (see
      # docs/getting_started.md), so we set one up rather than using actions/setup-python.
      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          activate-environment: spear-env

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Install the spear Python package
        run: conda run --no-capture-output -n spear-env pip install -e python

      - name: Build third-party libraries
        run: conda run --no-capture-output -n spear-env python tools/build_third_party_libs.py

      - name: Build and install the spear_ext Python extension module
        run: conda run --no-capture-output -n spear-env python tools/install_python_extension.py --conda-script "$CONDA/etc/profile.d/conda.sh"

      - name: Import spear_ext
        run: conda run --no-capture-output -n spear-env python -c "import spear_ext; print('spear_ext imported successfully')"
