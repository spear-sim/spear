SP_CORE:

  # Wait for keyboard input during initialization, which can be useful when attempting to attach a debugger
  # to the running executable.
  WAIT_FOR_KEYBOARD_INPUT_DURING_INITIALIZATION: False

  # Initial ID to use when creating shared memory regions. Shared memory regions are assigned monotonically
  # increasing IDs when they are created. If there are multiple instances running on the same machine, each
  # instance needs a unique initial ID, such that no instance ever needs to use an ID that has is already
  # being used by another instance.
  SHARED_MEMORY_INITIAL_UNIQUE_ID: 0

  # Verbose debug printing for the proxy component system.
  PROXY_COMPONENT_MANAGER:
    VERBOSE: False
  MESH_PROXY_COMPONENT_MANAGER:
    VERBOSE: False

  #
  # We allow the user to override the ini values in the project Config directory. These overrides must happen
  # very early in the application lifecycle because they can affect the initialization of engine systems that
  # can't be changed at runtime, e.g., which graphics API to use, etc. Each CONFIG_*_INI_STRING is interpreted as
  # Unreal INI text (section headers, key=value lines, and the +/-/./! array operators), exactly as if the text
  # had been appended to the corresponding default INI file. We recommend specifying these strings using YAML
  # block scalars, e.g.,
  #
  #   OVERRIDE_CONFIG_ENGINE_INI: True
  #   CONFIG_ENGINE_INI_STRING: |
  #     [/Script/Engine.RendererSettings]
  #     r.CustomDepth=3
  #

  OVERRIDE_CONFIG_EDITOR_INI: False
  CONFIG_EDITOR_INI_STRING: ""
  OVERRIDE_CONFIG_ENGINE_INI: False
  CONFIG_ENGINE_INI_STRING: ""
  OVERRIDE_CONFIG_GAME_INI: False
  CONFIG_GAME_INI_STRING: ""
  OVERRIDE_CONFIG_GAME_USER_SETTINGS_INI: False
  CONFIG_GAME_USER_SETTINGS_INI_STRING: ""
  OVERRIDE_CONFIG_INPUT_INI: False
  CONFIG_INPUT_INI_STRING: ""
